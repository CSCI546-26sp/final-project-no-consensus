<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>no-consensus · DFS Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg-0: #0a0b10;
  --bg-1: #0f1119;
  --bg-2: #161923;
  --bg-3: #1e2230;
  --bg-4: #252a3b;
  --line: #262b3d;
  --line-2: #323a54;
  --ink-0: #eef0f7;
  --ink-1: #b8bdd2;
  --ink-2: #808699;
  --ink-3: #525872;
  --accent: oklch(0.72 0.17 255);
  --accent-soft: oklch(0.72 0.17 255 / 0.15);
  --accent-2: oklch(0.78 0.17 155);
  --accent-3: oklch(0.78 0.17 45);
  --danger: oklch(0.70 0.18 25);
  --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --sans: 'Geist', ui-sans-serif, -apple-system, system-ui;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--ink-0); font-family: var(--sans); overflow: hidden; height: 100vh; font-size: 14px; }
body {
  background:
    radial-gradient(ellipse 1400px 900px at 50% -10%, oklch(0.72 0.17 255 / 0.08), transparent 60%),
    radial-gradient(ellipse 1000px 700px at 80% 110%, oklch(0.78 0.17 155 / 0.06), transparent 60%),
    var(--bg-0);
}
button, input, select, textarea { font-family: inherit; }

/* ===== Layout: topbar + stage (top) + control strip (bottom) ===== */
.app {
  display: grid;
  grid-template-columns: 320px 1fr 360px;
  grid-template-rows: 56px minmax(0, 1fr);
  height: 100vh;
  width: 100vw;
}
@media (max-width: 1280px) {
  .app { grid-template-columns: 280px 1fr 320px; }
}
@media (max-width: 1000px) {
  .app { grid-template-columns: 240px 1fr 280px; }
}

.topbar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 22px;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  background: rgba(15,17,25,0.88);
  backdrop-filter: blur(10px);
  z-index: 30;
}
.logo { display: flex; align-items: center; gap: 12px; font-weight: 600; letter-spacing: -0.01em; font-size: 15px; }
.logo-mark { width: 24px; height: 24px; display: grid; grid-template: 1fr 1fr / 1fr 1fr; gap: 2px; }
.logo-mark span { background: var(--ink-0); border-radius: 2px; }
.logo-mark span:nth-child(1) { background: var(--accent); }
.logo-mark span:nth-child(4) { background: var(--accent-2); }
.logo small { color: var(--ink-2); font-weight: 400; margin-left: 6px; font-size: 13px; }
.cluster-status { display: flex; align-items: center; gap: 18px; margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--ink-1); }
.stat { display: flex; align-items: center; gap: 7px; }
.stat .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-2); box-shadow: 0 0 8px var(--accent-2); }
.stat .k { color: var(--ink-2); }
.stat .v { color: var(--ink-0); font-weight: 500; }

/* ===== Left panel ===== */
.left {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  background: var(--bg-1);
  min-height: 0;
  overflow: hidden;
}
.panel-section { padding: 18px 20px; border-bottom: 1px solid var(--line); }
.panel-section:last-child { border-bottom: none; }
.panel-title {
  font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-2); margin-bottom: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title .count { font-family: var(--mono); color: var(--ink-1); background: var(--bg-2); padding: 3px 8px; border-radius: 5px; letter-spacing: 0; text-transform: none; font-size: 12px; font-weight: 400; }

.drop {
  border: 1px dashed var(--line-2);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: var(--bg-2);
}
.drop:hover, .drop.over { border-color: var(--accent); background: oklch(0.72 0.17 255 / 0.06); }
.drop-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 14px; color: var(--ink-0); font-weight: 500; }
.drop-head .plus { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center; background: var(--bg-3); color: var(--ink-0); font-size: 16px; line-height: 1; }
.drop-sub { font-size: 12px; color: var(--ink-2); margin-top: 6px; font-family: var(--mono); }
.drop-file { margin-top: 12px; padding: 10px 12px; background: var(--bg-3); border-radius: 7px; display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12.5px; color: var(--ink-0); }
.drop-file .x { color: var(--ink-2); font-size: 13px; margin-left: auto; cursor: pointer; padding: 2px 7px; border-radius: 4px; }
.drop-file .x:hover { background: var(--bg-2); color: var(--ink-0); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--accent); color: #07101e;
  border: none; padding: 11px 16px; border-radius: 8px;
  font-weight: 600; font-size: 13.5px;
  cursor: pointer; transition: filter 0.1s ease, transform 0.05s ease;
  letter-spacing: -0.01em;
}
.btn:hover { filter: brightness(1.1); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn.full { width: 100%; margin-top: 12px; }

/* File list */
.file-list {
  flex: 1; overflow-y: auto;
  padding: 4px 10px 16px;
  min-height: 0;
}
.file-list::-webkit-scrollbar { width: 7px; }
.file-list::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

.file-row {
  padding: 11px 12px;
  border-radius: 8px;
  display: grid;
  grid-template-columns: 20px 1fr auto;
  gap: 11px; align-items: center;
  cursor: pointer;
  transition: background 0.1s ease;
}
.file-row:hover { background: var(--bg-2); }
.file-row.active { background: var(--bg-2); box-shadow: inset 2px 0 0 var(--accent); }
.file-icon { width: 16px; height: 20px; background: var(--bg-3); border-radius: 2px; border: 1px solid var(--line-2); position: relative; }
.file-icon::before { content: ''; position: absolute; inset: 4px 3px; border-top: 1px solid var(--line-2); box-shadow: 0 4px 0 -1px var(--line-2), 0 8px 0 -1px var(--line-2); }
.file-name { font-size: 13.5px; color: var(--ink-0); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); margin-top: 3px; }
.file-chunks { display: flex; gap: 2px; align-items: center; }
.chunk-pill { width: 6px; height: 14px; border-radius: 1.5px; background: var(--line-2); }
.chunk-pill.s0 { background: oklch(0.72 0.17 255); }
.chunk-pill.s1 { background: oklch(0.78 0.17 155); }
.chunk-pill.s2 { background: oklch(0.78 0.17 45); }

/* Swipe-to-action row */
.swipe-wrap {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 2px;
  /* contain animation when collapsing */
  transition: max-height 0.28s ease, opacity 0.28s ease, margin 0.28s ease;
  max-height: 80px;
  opacity: 1;
}
.swipe-wrap.removing {
  max-height: 0 !important;
  opacity: 0 !important;
  margin-bottom: 0 !important;
  pointer-events: none;
}
.swipe-action {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 78px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  user-select: none;
}
.swipe-action.delete {
  background: linear-gradient(180deg, oklch(0.55 0.20 25), oklch(0.45 0.20 25));
  color: #fff;
}
.swipe-action.recover {
  background: linear-gradient(180deg, oklch(0.62 0.17 155), oklch(0.50 0.17 155));
  color: #07101e;
}
.swipe-action:hover { filter: brightness(1.08); }
.swipe-action svg { width: 16px; height: 16px; }
.swipe-action .lbl { margin-left: 6px; }
.swipe-foreground {
  position: relative;
  background: var(--bg-1);
  transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
  will-change: transform;
  touch-action: pan-y;
}
.swipe-foreground.dragging {
  transition: none;
}
.swipe-hint {
  position: absolute;
  top: 50%;
  right: 8px;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.15s ease;
  pointer-events: none;
}
.swipe-wrap:hover .swipe-hint { opacity: 0.6; }
.swipe-wrap.open .swipe-hint { opacity: 0; }

/* Pane selector dropdown */
.pane-select {
  position: relative;
  margin: 0 0 12px;
}
.pane-select-button {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  color: var(--ink-0);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: background 0.1s ease, border-color 0.1s ease;
}
.pane-select-button:hover { background: var(--bg-3); border-color: var(--line-2); }
.pane-select-button .label { display: flex; align-items: center; gap: 8px; }
.pane-select-button .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.pane-select-button .dot.deleted { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
.pane-select-button .chev { color: var(--ink-2); font-size: 10px; transition: transform 0.15s ease; }
.pane-select-button.open .chev { transform: rotate(180deg); }
.pane-select-menu {
  position: absolute;
  top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 8px;
  z-index: 12;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
}
.pane-select-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  color: var(--ink-0);
  font-size: 13px;
  transition: background 0.1s ease;
}
.pane-select-item:hover { background: var(--bg-3); }
.pane-select-item.active { background: var(--bg-3); color: var(--ink-0); }
.pane-select-item .meta { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
.pane-select-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.pane-select-item .dot.deleted { background: var(--danger); }

.deleted-row {
  padding: 11px 12px;
  display: grid;
  grid-template-columns: 20px 1fr;
  gap: 11px; align-items: center;
}
.deleted-icon { width: 16px; height: 20px; background: var(--bg-3); border-radius: 2px; border: 1px dashed var(--line-2); position: relative; opacity: 0.6; }
.deleted-icon::after {
  content: '';
  position: absolute; left: 50%; top: 50%;
  width: 110%; height: 1px;
  background: var(--danger);
  transform: translate(-50%, -50%) rotate(-18deg);
  opacity: 0.7;
}
.deleted-name { font-size: 13.5px; color: var(--ink-1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: line-through; text-decoration-color: var(--ink-3); text-decoration-thickness: 1px; }
.deleted-meta { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); margin-top: 3px; }
.deleted-meta .gc { color: var(--danger); opacity: 0.85; }

/* ===== Center stage ===== */
.stage-wrap {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% 55%, oklch(0.25 0.02 260 / 0.6), transparent 75%),
    linear-gradient(180deg, #0b0d14 0%, #080a10 100%);
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.stage-wrap::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(oklch(0.35 0.03 260 / 0.08) 1px, transparent 1px),
    linear-gradient(90deg, oklch(0.35 0.03 260 / 0.08) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 90%);
  pointer-events: none;
}

.stage-hud {
  position: absolute; z-index: 5; pointer-events: none;
  font-family: var(--mono); color: var(--ink-2); font-size: 12px; letter-spacing: 0.04em;
}
.stage-hud b { color: var(--ink-1); font-weight: 500; }
.hud-tl { top: 16px; left: 16px; }
.hud-tr { top: 16px; right: 16px; text-align: right; }

.scene {
  position: relative;
  flex: 1;
  min-height: 0;
  perspective: 1800px;
  perspective-origin: 50% 30%;
  overflow: hidden;
}
.world {
  position: absolute;
  transform-style: preserve-3d;
  transform: rotateX(24deg);
  transform-origin: center center;
}
/* Floor */
.floor {
  position: absolute;
  left: 50%; top: 50%;
  width: 1200px; height: 1200px;
  margin-left: -600px; margin-top: -600px;
  transform-style: preserve-3d;
  transform: rotateX(90deg) translateZ(-180px);
  border-radius: 50%;
  background:
    radial-gradient(circle, oklch(0.72 0.17 255 / 0.04) 0%, transparent 55%),
    repeating-radial-gradient(circle, transparent 0 80px, oklch(0.35 0.03 260 / 0.15) 80px 81px);
  pointer-events: none;
}
.floor::before {
  content: ''; position: absolute; inset: 30%;
  border: 1px dashed oklch(0.72 0.17 255 / 0.25);
  border-radius: 50%;
  animation: spin 80s linear infinite;
}
.floor::after {
  content: ''; position: absolute; inset: 8%;
  border: 1px solid oklch(0.35 0.03 260 / 0.25);
  border-radius: 50%;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Rack-style server ===== */
.node {
  position: absolute;
  left: 50%; top: 50%;
  transform-style: preserve-3d;
  --rw: 204px;
  --rh: 240px;
  --rd: 108px;
}
.node.master { --rw: 200px; --rh: 230px; --rd: 110px; }

.rack {
  position: relative;
  width: var(--rw); height: var(--rh);
  transform-style: preserve-3d;
  transform: translate(-50%, -50%);
}
.rface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* front face — the detailed one */
.rface.front {
  transform: translateZ(calc(var(--rd) / 2));
  background: linear-gradient(180deg, #1a1e2c, #10131c);
  border: 1px solid var(--line-2);
  border-radius: 8px;
  display: flex; flex-direction: column;
  padding: 8px 8px 10px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.3) inset;
}
.rface.back {
  transform: translateZ(calc(var(--rd) / -2)) rotateY(180deg);
  background: #0c0e16;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.rface.left {
  width: var(--rd);
  transform: translateX(calc(var(--rd) / -2)) rotateY(-90deg);
  background: linear-gradient(180deg, #14172180, #0a0c1480);
  border: 1px solid var(--line);
}
.rface.right {
  width: var(--rd);
  left: calc(100% - var(--rd));
  transform: translateX(calc(var(--rd) / 2)) rotateY(90deg);
  background: linear-gradient(180deg, #14172180, #0a0c1480);
  border: 1px solid var(--line);
}
.rface.top {
  height: var(--rd);
  transform: translateY(calc(var(--rd) / -2)) rotateX(90deg);
  top: calc(var(--rd) / 2);
  background: linear-gradient(90deg, #181c28, #11141d);
  border: 1px solid var(--line-2);
  border-radius: 4px;
}
.rface.bottom {
  height: var(--rd);
  transform: translateY(calc(var(--rd) / 2)) rotateX(-90deg);
  top: calc(100% - var(--rd) / 2);
  background: #05060a;
  border: 1px solid var(--line);
}

/* rack header (front) */
.rack-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 6px;
}
.rack-header .name { font-family: var(--mono); font-size: 11.5px; color: var(--ink-0); font-weight: 600; letter-spacing: 0.03em; }
.node.master .rack-header .name { font-size: 13px; }
.rack-header .status-led { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); animation: blink 1.8s ease-in-out infinite; }
.node.master .rack-header .status-led { background: var(--accent-3); box-shadow: 0 0 6px var(--accent-3); }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* disk bays — stacked horizontal rectangles */
.bays { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.bay {
  height: 14px;
  background: linear-gradient(90deg, #0d1019, #141824);
  border: 1px solid var(--line);
  border-radius: 2px;
  display: flex; align-items: center;
  padding: 0 5px 0 4px;
  gap: 5px;
  font-family: var(--mono); font-size: 9px; color: var(--ink-3);
  position: relative;
}
.bay .bay-led { width: 4px; height: 4px; border-radius: 50%; background: var(--line-2); flex-shrink: 0; }
.bay .bay-bar { flex: 1; height: 2px; background: var(--bg-3); border-radius: 1px; overflow: hidden; }
.bay .bay-fill { height: 100%; background: var(--line-2); transition: width 0.3s ease; }
.bay.used .bay-led { background: var(--_c, var(--accent)); box-shadow: 0 0 4px var(--_c, var(--accent)); }
.bay.used .bay-fill { background: var(--_c, var(--accent)); }
.bay.active .bay-led { animation: blink 0.5s ease-in-out infinite; }
.bay.matched {
  background: linear-gradient(90deg, oklch(0.3 0.1 155), oklch(0.4 0.15 155));
  border-color: oklch(0.85 0.2 155);
  box-shadow: 0 0 10px oklch(0.78 0.17 155 / 0.7), inset 0 0 6px oklch(0.85 0.2 155 / 0.4);
  animation: matchBay 0.9s ease-in-out infinite alternate;
}
.bay.matched .bay-led { background: oklch(0.9 0.2 155); box-shadow: 0 0 6px oklch(0.9 0.2 155); }
@keyframes matchBay {
  from { filter: brightness(1); }
  to { filter: brightness(1.3); }
}

/* rack footer — stats line */
.rack-footer {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-2);
  margin-top: 6px;
  padding-top: 5px;
  border-top: 1px solid var(--line);
}
.rack-footer b { color: var(--ink-1); font-weight: 500; }

/* master has different front content: CPU-like grid + indicators */
.master-brain {
  flex: 1;
  background:
    linear-gradient(90deg, transparent 0 2px, oklch(0.35 0.03 260 / 0.35) 2px 3px) 0 0 / 20px 100%,
    linear-gradient(180deg, transparent 0 2px, oklch(0.35 0.03 260 / 0.35) 2px 3px) 0 0 / 100% 16px,
    radial-gradient(circle at 50% 50%, oklch(0.78 0.17 45 / 0.25), transparent 60%);
  border: 1px solid var(--line);
  border-radius: 4px;
  position: relative;
  display: grid;
  place-items: center;
  overflow: hidden;
}
.master-brain .core {
  width: 70%; height: 52%;
  background: linear-gradient(135deg, oklch(0.78 0.17 45 / 0.18), oklch(0.25 0.05 260 / 0.5));
  border: 1px solid oklch(0.78 0.17 45 / 0.5);
  border-radius: 3px;
  position: relative;
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 10px; color: oklch(0.95 0.1 45); letter-spacing: 0.12em;
  font-weight: 600;
}
.master-brain .core::before, .master-brain .core::after {
  content: ''; position: absolute;
  border: 1px solid oklch(0.78 0.17 45 / 0.4); border-radius: 1px;
}
.master-brain .core::before { inset: -6px; animation: pulseRing2 2.4s ease-out infinite; }
.master-brain .core::after { inset: -12px; animation: pulseRing2 2.4s ease-out infinite 0.8s; }
@keyframes pulseRing2 {
  0% { opacity: 0.8; transform: scale(0.9); }
  100% { opacity: 0; transform: scale(1.4); }
}
.master-meta {
  margin-top: 6px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
  font-family: var(--mono); font-size: 10px; color: var(--ink-2);
}
.master-meta span b { color: var(--ink-1); font-weight: 500; }

/* Server shadow on floor */
.server-shadow {
  position: absolute;
  width: 140%; height: 60px;
  left: -20%;
  top: calc(100% - 20px);
  transform: rotateX(90deg);
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), transparent 70%);
  pointer-events: none;
}

/* glow ring under active servers */
.server-glow {
  position: absolute;
  inset: -40px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--_gc, var(--accent)), transparent 65%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  filter: blur(18px);
  transform: translateZ(-30px);
}
.node.glowing .server-glow { opacity: 0.55; }

/* Server label above */
.server-tag {
  position: absolute;
  top: -28px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}
.server-tag b { color: var(--ink-0); font-weight: 600; }

/* Match badge */
.match-badge {
  position: absolute;
  top: -58px; left: 50%;
  transform: translateX(-50%);
  background: oklch(0.85 0.2 155 / 0.18);
  border: 1px solid oklch(0.85 0.2 155);
  color: oklch(0.95 0.2 155);
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  animation: badgeIn 0.3s ease-out;
  box-shadow: 0 0 16px oklch(0.78 0.17 155 / 0.4);
}
@keyframes badgeIn { from { opacity: 0; transform: translateX(-50%) translateY(4px); } to { opacity: 1; transform: translateX(-50%); } }

/* Wires svg overlay */
.wires { position: absolute; pointer-events: none; overflow: visible; }

/* Flying packet */
.packet {
  position: absolute;
  width: 20px; height: 20px;
  transform-style: preserve-3d;
  pointer-events: none;
  will-change: transform;
  z-index: 60;
}
.packet .pface {
  position: absolute; inset: 0;
  background: var(--_pc, var(--accent));
  border: 1px solid oklch(from var(--_pc, var(--accent)) 0.95 c h);
  box-shadow: 0 0 14px var(--_pc, var(--accent));
  border-radius: 2px;
}
.packet .pface.top    { transform: rotateX(90deg)  translateZ(10px); }
.packet .pface.front  { transform: translateZ(10px); }
.packet .pface.back   { transform: rotateY(180deg) translateZ(10px); }
.packet .pface.left   { transform: rotateY(-90deg) translateZ(10px); }
.packet .pface.right  { transform: rotateY(90deg)  translateZ(10px); }
.packet .pface.bottom { transform: rotateX(-90deg) translateZ(10px); }

/* Pulse ring */
.pulse-ring {
  position: absolute;
  left: 50%; top: 50%;
  width: 90px; height: 90px;
  margin-left: -45px; margin-top: -45px;
  border: 2px solid var(--_rc, var(--accent));
  border-radius: 50%;
  pointer-events: none;
  animation: pulseRingA 1.2s ease-out forwards;
  transform-style: preserve-3d;
}
@keyframes pulseRingA {
  0% { opacity: 0.9; transform: translate3d(var(--_rx,0), 0, var(--_rz,0)) rotateX(90deg) scale(0.2); }
  100% { opacity: 0; transform: translate3d(var(--_rx,0), 0, var(--_rz,0)) rotateX(90deg) scale(5); }
}

/* Client box */
.client-node {
  position: absolute;
  left: 18px; top: 50%;
  transform: translateY(-50%);
  z-index: 6;
  pointer-events: none;
}
.client-box {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 12px 14px;
  font-family: var(--mono);
  color: var(--ink-1);
  display: flex; align-items: center; gap: 10px;
  min-width: 130px;
}
.client-box .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.client-box .ct-title { font-size: 13px; color: var(--ink-0); font-weight: 600; }
.client-box .ct-sub { font-size: 11px; color: var(--ink-2); margin-top: 2px; }

/* ===== Right panel ===== */
.right {
  border-left: 1px solid var(--line);
  background: var(--bg-1);
  display: flex; flex-direction: column;
  min-height: 0;
}
.search-box { padding: 18px 20px; border-bottom: 1px solid var(--line); }

.select-wrap {
  display: flex; flex-direction: column; gap: 8px;
}
.select-row {
  display: flex; align-items: center; gap: 10px;
}
.select-row .sl-label {
  font-family: var(--mono); font-size: 12px; color: var(--ink-2);
  min-width: 46px;
}
.select-row select {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  color: var(--ink-0);
  padding: 9px 10px;
  border-radius: 7px;
  font-size: 13px;
  font-family: var(--mono);
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s ease;
}
.select-row select:hover { border-color: var(--line-2); }
.select-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.search-input-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 9px;
  padding: 0 12px;
  margin-top: 12px;
  transition: border-color 0.15s ease;
}
.search-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search-input-wrap input {
  flex: 1;
  background: transparent; border: none; outline: none;
  color: var(--ink-0);
  padding: 11px 0;
  font-size: 14px;
  font-family: var(--mono);
}
.search-input-wrap input::placeholder { color: var(--ink-3); }
.search-input-wrap .kbd { font-family: var(--mono); font-size: 11px; color: var(--ink-2); padding: 3px 6px; border: 1px solid var(--line-2); border-radius: 4px; }

.search-controls { display: flex; gap: 10px; margin-top: 12px; }

.latency-bar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--line);
  font-family: var(--mono); font-size: 12.5px;
  display: flex; align-items: center; justify-content: space-between;
  color: var(--ink-1);
  background: var(--bg-2);
}
.latency-bar .big { color: var(--accent-2); font-weight: 600; font-size: 17px; letter-spacing: -0.02em; }
.latency-bar .meta { color: var(--ink-2); }

.results { flex: 1; overflow-y: auto; min-height: 0; }
.results::-webkit-scrollbar { width: 7px; }
.results::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

.result-empty { padding: 56px 28px; text-align: center; color: var(--ink-2); font-size: 14px; line-height: 1.6; }
.result-empty .big-num {
  font-family: var(--mono); font-size: 42px; font-weight: 600;
  color: var(--ink-3); letter-spacing: -0.02em;
  display: block; margin-bottom: 12px;
}

.result-item { padding: 14px 20px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s ease; box-sizing: border-box; }
.result-item:hover { background: var(--bg-2); }
.result-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.result-filename { font-size: 13.5px; font-weight: 500; color: var(--ink-0); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-score {
  font-family: var(--mono); font-size: 11.5px;
  color: var(--accent-2);
  background: oklch(0.78 0.17 155 / 0.14);
  padding: 3px 8px; border-radius: 5px; font-weight: 500;
}
.result-snippet {
  font-family: var(--mono); font-size: 12.5px;
  color: var(--ink-1);
  line-height: 1.55;
  background: var(--bg-2);
  border-left: 2px solid var(--accent-2);
  padding: 9px 12px;
  border-radius: 0 6px 6px 0;
  white-space: pre-wrap;
  word-break: break-word;
}
.result-snippet em {
  color: var(--ink-0);
  background: oklch(0.78 0.17 155 / 0.25);
  padding: 0 3px; border-radius: 2px; font-style: normal; font-weight: 600;
}
.result-meta { display: flex; align-items: center; gap: 11px; margin-top: 8px; font-family: var(--mono); font-size: 11px; color: var(--ink-2); flex-wrap: wrap; }
.result-meta .dot-c { width: 7px; height: 7px; border-radius: 2px; }
.result-meta .dot-c.s0 { background: oklch(0.72 0.17 255); }
.result-meta .dot-c.s1 { background: oklch(0.78 0.17 155); }
.result-meta .dot-c.s2 { background: oklch(0.78 0.17 45); }

/* Indexing status panel */
.index-status {
  margin-top: 12px;
  padding: 11px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: var(--mono);
  display: flex; flex-direction: column; gap: 8px;
}
.index-status + .index-status { margin-top: 8px; }
.index-status.done { border-color: oklch(0.78 0.17 155 / 0.55); }
.index-status.error { border-color: oklch(0.70 0.18 25 / 0.55); }
.index-status-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  font-size: 12px;
}
.index-status-row .ix-name {
  color: var(--ink-0);
  font-weight: 500;
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 12.5px;
}
.index-status-row .ix-state { color: var(--ink-1); }
.index-status.done .ix-state { color: var(--accent-2); font-weight: 500; }
.index-status.error .ix-state { color: var(--danger); }
.index-status-bar {
  position: relative;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
}
.index-status-bar .ix-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.index-status.done .ix-fill { background: var(--accent-2); }
.index-status.error .ix-fill { background: var(--danger); }
.index-status-bar.indeterminate .ix-fill {
  width: 30% !important;
  animation: ixSlide 1.4s ease-in-out infinite;
}
@keyframes ixSlide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(380%); }
}
.index-status-meta {
  font-size: 10.5px;
  color: var(--ink-2);
  letter-spacing: 0.02em;
}

/* Toasts */
.toast-stack { position: fixed; top: 72px; right: 420px; z-index: 100; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
@media (max-width: 1280px) { .toast-stack { right: 380px; } }
.toast {
  background: rgba(20,23,32,0.96);
  backdrop-filter: blur(10px);
  border: 1px solid var(--line-2);
  border-left: 3px solid var(--accent);
  padding: 10px 16px;
  border-radius: 8px;
  font-family: var(--mono); font-size: 13px;
  color: var(--ink-0);
  animation: toastIn 0.3s ease-out;
  min-width: 280px;
}
.toast.ok { border-left-color: var(--accent-2); }
.toast.err { border-left-color: var(--danger); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* Tweaks panel */
.tweaks {
  position: fixed;
  right: 420px;
  bottom: 20px;
  width: 280px;
  background: rgba(15,17,25,0.96);
  backdrop-filter: blur(14px);
  border: 1px solid var(--line-2);
  border-radius: 12px;
  padding: 16px;
  z-index: 70;
}
.tweaks h4 { margin: 0 0 12px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); font-weight: 600; }
.tweak-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
.tweak-row label { color: var(--ink-1); font-size: 12.5px; }
.tweak-row input[type=range] { width: 110px; }
.tweak-row select { background: var(--bg-2); color: var(--ink-0); border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: 12px; font-family: var(--mono); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ===== Utilities ===== */
function humanSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }
function highlightTokens(text, tokens) {
  // TF-IDF mode: highlight whole-word matches only, so "particle" doesn't
  // also light up "particles" / "particled".
  let html = escapeHtml(text);
  tokens.forEach(tok => {
    if (!tok) return;
    const re = new RegExp('\\b(' + escapeRe(tok) + ')\\b', 'gi');
    html = html.replace(re, '<em>$1</em>');
  });
  return html;
}

function highlightPhrase(text, phrase) {
  // File-search mode: the result is guaranteed to contain the literal phrase,
  // so highlight the phrase itself as a single span — no word splitting.
  const html = escapeHtml(text);
  if (!phrase) return html;
  const re = new RegExp('(' + escapeRe(phrase) + ')', 'gi');
  return html.replace(re, '<em>$1</em>');
}

/* ===== Server positions — vertical layout with more breathing room ===== */
const SERVER_POS = [
  { id: 0, x: -240, y:  100, vy: 0, name: 'chunk-01' },
  { id: 1, x:    0, y:  100, vy: 0, name: 'chunk-02' },
  { id: 2, x:  240, y:  100, vy: 0, name: 'chunk-03' },
];
const MASTER_POS = { x: 0, y: 100, vy: -260, name: 'master' };

const COLORS = ['s0', 's1', 's2'];
const COLOR_HEX = ['oklch(0.72 0.17 255)', 'oklch(0.78 0.17 155)', 'oklch(0.78 0.17 45)'];

/* ===== Stage ===== */
function Stage({ state, tweaks }) {
  const stageRef = useRef(null);
  const [scale, setScale] = useState(1);
  const [packets, setPackets] = useState([]);
  const [pulses, setPulses] = useState([]);
  const idRef = useRef(0);

  // auto-fit
  useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const update = () => {
      const w = el.clientWidth;
      const h = el.clientHeight;
      const s = Math.min(w / 780, h / 620, 1);
      setScale(Math.max(0.35, s));
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    window.__stage = {
      fireUploadPacket: (serverIdx, delayMs) => {
        setTimeout(() => {
          const id = ++idRef.current;
          setPackets(p => [...p, { id, serverIdx }]);
          setTimeout(() => setPackets(p => p.filter(x => x.id !== id)), 1800);
        }, delayMs);
      },
      fireQueryPulse: () => {
        const id = ++idRef.current;
        setPulses(p => [...p, { id, at: 'master' }]);
        setTimeout(() => setPulses(p => p.filter(x => x.id !== id)), 1200);
        setTimeout(() => {
          [0,1,2].forEach(i => {
            const sid = ++idRef.current;
            setPulses(p => [...p, { id: sid, at: 'c' + i }]);
            setTimeout(() => setPulses(p => p.filter(x => x.id !== sid)), 1200);
          });
        }, 260);
      },
    };
  }, []);

  const serverChunks = useMemo(() => {
    const out = [[], [], []];
    state.files.forEach(f => {
      f.chunks.forEach(c => {
        const targets = (c.serverIds && c.serverIds.length) ? c.serverIds : [c.serverIdx];
        targets.forEach(sid => {
          if (out[sid]) out[sid].push({ ...c, matched: state.matchedHandles.has(c.handle) });
        });
      });
    });
    return out;
  }, [state.files, state.matchedHandles]);

  return (
    <div ref={stageRef} className="stage-wrap">
      <div className="stage-hud hud-tl">
        <div><b>cluster</b> &nbsp;·&nbsp; no-consensus</div>
        <div style={{ marginTop: 3, color: 'var(--ink-3)' }}>region us-west-2 · 192.168.40.0/24</div>
      </div>
      <div className="stage-hud hud-tr">
        <div><b>uptime</b> &nbsp;14d 02:11:{String(state.sec).padStart(2,'0')}</div>
        <div style={{ marginTop: 3, color: 'var(--ink-3)' }}>last gc · 00:03:42 ago</div>
      </div>

      <div className="client-node">
        <div className="client-box">
          <span className="dot"></span>
          <div>
            <div className="ct-title">client</div>
            <div className="ct-sub">:8080</div>
          </div>
        </div>
      </div>

      <div className="scene">
        <div className="world" style={{ transform: `translate(-50%, -50%) scale(${scale}) rotateX(24deg)`, left: '50%', top: '50%', width: 700, height: 500 }}>
          <div className="floor" />
          <Wires />
          <MasterNode pos={MASTER_POS} busy={state.stage === 'upload' || state.stage === 'searching'} />
          {SERVER_POS.map((s, i) => (
            <ChunkServerNode
              key={i}
              pos={s}
              idx={i}
              chunks={serverChunks[i]}
              glowing={state.highlightServer === i}
              totalMatches={state.serverMatches[i] || 0}
              active={state.stage === 'searching' || state.stage === 'upload'}
            />
          ))}
          {pulses.map(p => <PulseRing key={p.id} at={p.at} />)}
          {packets.map(p => <Packet key={p.id} serverIdx={p.serverIdx} />)}
        </div>
      </div>
    </div>
  );
}

function Wires() {
  const m = { x: MASTER_POS.x, y: MASTER_POS.y };
  return (
    <svg className="wires" width="1000" height="900"
      style={{
        left: '50%', top: '50%',
        marginLeft: -500, marginTop: -450,
        transform: 'rotateX(90deg) translateZ(-179px)',
      }}>
      <g transform="translate(500,450)">
        {SERVER_POS.map((s, i) => (
          <line key={i}
            x1={m.x} y1={m.y}
            x2={s.x} y2={s.y}
            stroke={COLOR_HEX[i]} strokeOpacity="0.4"
            strokeWidth="1.4" strokeDasharray="5 7">
            <animate attributeName="stroke-dashoffset" from="0" to="-24" dur="2.2s" repeatCount="indefinite" />
          </line>
        ))}
        {/* client -> master */}
        <line x1={-500} y1={0} x2={m.x} y2={m.y}
          stroke="var(--line-2)" strokeOpacity="0.5"
          strokeWidth="1.2" strokeDasharray="3 6" />
      </g>
    </svg>
  );
}

/* ===== Master — CPU-like front ===== */
function MasterNode({ pos, busy }) {
  return (
    <div className="node master" style={{ transform: `translate3d(${pos.x}px, ${pos.vy ?? 0}px, ${pos.y}px)` }}>
      <div className="server-shadow" />
      <div className="server-glow" style={{ '--_gc': COLOR_HEX[2] }} />
      <div className="rack">
        <div className="rface back"></div>
        <div className="rface left"></div>
        <div className="rface right"></div>
        <div className="rface top"></div>
        <div className="rface bottom"></div>
        <div className="rface front">
          <div className="rack-header">
            <div className="name">dfs-master</div>
            <div className="status-led"></div>
          </div>
          <div className="master-brain">
            <div className="core">MASTER</div>
          </div>
          <div className="master-meta">
            <span>ns <b>312</b></span>
            <span>repl <b>×2</b></span>
            <span>mem <b>48 MB</b></span>
            <span>hb <b>3/3</b></span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== Chunk Server — rack with disk bays ===== */
function ChunkServerNode({ pos, idx, chunks, glowing, totalMatches, active }) {
  const colorHex = COLOR_HEX[idx];
  // Show 10 bay slots. Each bay represents one chunk OR empty.
  const BAY_COUNT = 10;
  const visible = chunks.slice(-BAY_COUNT);
  const bays = [];
  for (let i = 0; i < BAY_COUNT; i++) {
    const c = visible[i];
    bays.push(c || null);
  }

  return (
    <div className={'node' + (glowing ? ' glowing' : '')} style={{ transform: `translate3d(${pos.x}px, ${pos.vy ?? 0}px, ${pos.y}px)` }}>
      <div className="server-shadow" />
      <div className="server-glow" style={{ '--_gc': colorHex }} />
      {totalMatches > 0 && (
        <div className="match-badge">{totalMatches} match{totalMatches > 1 ? 'es' : ''}</div>
      )}
      <div className="rack">
        <div className="rface back"></div>
        <div className="rface left"></div>
        <div className="rface right"></div>
        <div className="rface top"></div>
        <div className="rface bottom"></div>
        <div className="rface front">
          <div className="rack-header">
            <div className="name">{pos.name}</div>
            <div className="status-led" style={{ background: colorHex, boxShadow: `0 0 6px ${colorHex}` }}></div>
          </div>
          <div className="bays">
            {bays.map((c, i) => {
              const filled = !!c;
              const matched = c && c.matched;
              return (
                <div
                  key={i}
                  className={'bay ' + (filled ? 'used ' : '') + (matched ? 'matched ' : '') + (active && filled ? 'active' : '')}
                  style={{ '--_c': colorHex }}
                >
                  <span className="bay-led"></span>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 8.5, color: filled ? 'var(--ink-2)' : 'var(--ink-3)', minWidth: 14 }}>
                    {String(i).padStart(2,'0')}
                  </span>
                  <span className="bay-bar">
                    <span className="bay-fill" style={{ width: filled ? '100%' : '0%' }}></span>
                  </span>
                  <span style={{ fontFamily: 'var(--mono)', fontSize: 8.5, color: filled ? 'var(--ink-1)' : 'var(--ink-3)' }}>

/* ===== Indexing status row ===== */
function IndexingStatusRow({ job }) {
  const { filename, indexed, total, done, error, phase } = job;
  const pct = total > 0 ? Math.min(100, Math.round((indexed / total) * 100)) : 0;
  const cls = error ? 'index-status error' : (done ? 'index-status done' : 'index-status');
  let stateText;
  if (error) stateText = 'couldn’t verify';
  else if (done) stateText = 'ready ✓';
  else if (phase === 'uploading') stateText = 'uploading…';
  else if (total > 0) stateText = `${indexed} / ${total} chunks`;
  else stateText = 'indexing…';

  const indeterminate = !done && !error && (phase === 'uploading' || total === 0);

  let metaText;
  if (error) metaText = 'try searching to check if the file is ready';
  else if (done) metaText = 'searchable now';
  else if (phase === 'uploading') metaText = 'writing chunks to chunkservers';
  else metaText = 'building inverted + trigram indexes';

  return (
    <div className={cls}>
      <div className="index-status-row">
        <span className="ix-name">{filename}</span>
        <span className="ix-state">{stateText}</span>
      </div>
      <div className={'index-status-bar' + (indeterminate ? ' indeterminate' : '')}>
        <div className="ix-fill" style={{ width: (done || error) ? '100%' : `${pct}%` }} />
      </div>
      <div className="index-status-meta">{metaText}</div>
    </div>
  );
}

/* ===== Left panel ===== */
/* Swipe-left row: pointer drag reveals an action button under the foreground.
   - Drag left ≥ ACTION_WIDTH/2 to snap open, otherwise snap closed.
   - Click the revealed action: play removal animation, then call onAction.
   - Dragging with measurable movement suppresses the click on body. */
const ACTION_WIDTH = 78;
const OPEN_THRESHOLD = 36;
const DRAG_SLOP = 5;

function SwipeRow({ actionKind, actionLabel, onAction, onBodyClick, children }) {
  const [open, setOpen] = useState(false);
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [removing, setRemoving] = useState(false);
  const startRef = useRef(null);
  const movedRef = useRef(false);
  const wrapRef = useRef(null);

  const onPointerDown = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    startRef.current = { x: e.clientX, y: e.clientY };
    movedRef.current = false;
    setDragging(true);
    try { e.currentTarget.setPointerCapture?.(e.pointerId); } catch {}
  };
  const onPointerMove = (e) => {
    if (!startRef.current) return;
    const dx = e.clientX - startRef.current.x;
    const dy = e.clientY - startRef.current.y;
    if (!movedRef.current && (Math.abs(dx) > DRAG_SLOP || Math.abs(dy) > DRAG_SLOP)) {
      movedRef.current = true;
    }
    // Allow leftward drag up to ACTION_WIDTH; allow snap-closed if open.
    let next;
    if (open) {
      next = Math.max(-ACTION_WIDTH, Math.min(0, -ACTION_WIDTH + Math.max(0, dx)));
    } else {
      next = Math.max(-ACTION_WIDTH, Math.min(0, dx));
    }
    setDragX(next);
  };
  const onPointerUp = () => {
    if (!startRef.current) { setDragging(false); return; }
    const finalX = dragX;
    setDragging(false);
    setDragX(0);
    if (finalX <= -OPEN_THRESHOLD) setOpen(true);
    else setOpen(false);
    startRef.current = null;
  };
  const onPointerCancel = () => {
    setDragging(false);
    setDragX(0);
    startRef.current = null;
  };

  const handleBodyClick = (e) => {
    if (movedRef.current) { e.preventDefault(); e.stopPropagation(); return; }
    if (open) { setOpen(false); return; }
    onBodyClick?.(e);
  };

  const handleAction = (e) => {
    e.stopPropagation();
    setRemoving(true);
    setTimeout(() => { onAction?.(); }, 260);
  };

  // Close if the user clicks/scrolls anywhere else.
  useEffect(() => {
    if (!open) return;
    const close = (ev) => {
      if (wrapRef.current && wrapRef.current.contains(ev.target)) return;
      setOpen(false);
    };
    document.addEventListener('pointerdown', close);
    return () => document.removeEventListener('pointerdown', close);
  }, [open]);

  const tx = dragging ? dragX : (open ? -ACTION_WIDTH : 0);

  return (
    <div ref={wrapRef} className={'swipe-wrap' + (open ? ' open' : '') + (removing ? ' removing' : '')}>
      <div
        className={'swipe-action ' + actionKind}
        onClick={handleAction}
        title={actionLabel}
      >
        {actionKind === 'delete' ? (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
        ) : (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
        )}
      </div>
      <div
        className={'swipe-foreground' + (dragging ? ' dragging' : '')}
        style={{ transform: `translateX(${tx}px)` }}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerCancel}
        onClick={handleBodyClick}
      >
        {children}
        <span className="swipe-hint">← swipe</span>
      </div>
    </div>
  );
}

function PaneSelect({ value, onChange, namespaceCount, deletedCount }) {

function formatRelative(unixSec) {
  const diff = Math.max(0, Date.now() / 1000 - unixSec);
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function formatGc(seconds) {
  const s = Math.max(0, Math.floor(seconds));
  if (s >= 60) return `${Math.floor(s / 60)}m${s % 60 > 0 ? ' ' + (s % 60) + 's' : ''}`;
  return `${s}s`;
}

/* ===== Right panel ===== */
const SEARCH_MODES = [
  { id: 'all',     label: 'All files — full-text fan-out' },
  { id: 'file',    label: 'Single file — one target' },
];

/* Variable-height virtualized list. Each row is rendered in natural flow,
   measured via ResizeObserver, and its height cached. Cumulative offsets
   are recomputed only when a measured height changes. Binary search picks
   the visible window. DOM stays bounded to ~viewport rows, but rows can be
   any size (multi-line snippets etc.). */
const VIRTUAL_OVERSCAN = 4;
const VIRTUAL_ROW_ESTIMATE = 130;

function MeasuredRow({ index, top, onMeasure, children }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const report = () => onMeasure(index, el.offsetHeight);
    report();
    const ro = new ResizeObserver(report);
    ro.observe(el);
    return () => ro.disconnect();
  }, [index, onMeasure]);
  return (
    <div ref={ref} style={{ position: 'absolute', top, left: 0, right: 0 }}>
      {children}
    </div>
  );
}

const VirtualResults = React.memo(function VirtualResults({ results, scrollRef, renderRow }) {
  const [scrollTop, setScrollTop] = useState(0);
  const [viewportHeight, setViewportHeight] = useState(600);
  const [version, setVersion] = useState(0);

  // Per-row measured heights (mutable across renders). Reset when the
  // results array length changes — different search, different rows.
  const heightsRef = useRef([]);
  if (heightsRef.current.length !== results.length) {
    heightsRef.current = new Array(results.length).fill(VIRTUAL_ROW_ESTIMATE);
  }

  // rAF-throttled scroll/resize updates
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    let pending = false;
    const flush = () => {
      pending = false;
      setScrollTop(el.scrollTop);
      setViewportHeight(el.clientHeight);
    };
    const schedule = () => {
      if (pending) return;
      pending = true;
      requestAnimationFrame(flush);
    };
    flush();
    el.addEventListener('scroll', schedule, { passive: true });
    const ro = new ResizeObserver(schedule);
    ro.observe(el);
    return () => {
      el.removeEventListener('scroll', schedule);
      ro.disconnect();
    };
  }, [scrollRef]);

  // Cumulative offsets: offsets[i] = top of row i. offsets[N] = total height.
  // Rebuilt only when results, version (height changes), or estimate change.
  const offsets = useMemo(() => {
    const heights = heightsRef.current;
    const out = new Array(results.length + 1);
    out[0] = 0;
    for (let i = 0; i < results.length; i++) {
      out[i + 1] = out[i] + heights[i];
    }
    return out;
  }, [results.length, version]);

  const totalHeight = offsets[results.length];

  // Binary search: smallest index whose cumulative *bottom* edge > offset.
  const findRowAt = (offset) => {
    let lo = 0, hi = results.length;
    while (lo < hi) {
      const mid = (lo + hi) >>> 1;
      if (offsets[mid + 1] <= offset) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  };

  const startIdx = Math.max(0, findRowAt(scrollTop) - VIRTUAL_OVERSCAN);
  const endIdx = Math.min(results.length, findRowAt(scrollTop + viewportHeight) + 1 + VIRTUAL_OVERSCAN);

  const onMeasure = useCallback((i, h) => {
    if (heightsRef.current[i] === h) return;
    heightsRef.current[i] = h;
    setVersion(v => v + 1);
  }, []);

  const visible = [];
  for (let i = startIdx; i < endIdx; i++) {
    visible.push(
      <MeasuredRow key={i} index={i} top={offsets[i]} onMeasure={onMeasure}>
        {renderRow(results[i], i)}
      </MeasuredRow>
    );
  }
  return (
    <div style={{ height: totalHeight, position: 'relative' }}>
      {visible}
    </div>
  );
});

            <span className="big-num">&lt; 1 ms</span>
            search fans out to all three chunk servers in parallel.<br/>
            each runs its local inverted index; the master merges by TF‑IDF.
          </div>
        )}
        {state.stage === 'searching' && (
          <div className="result-empty">
            <span className="big-num" style={{ color: 'var(--accent)' }}>→</span>
            polling chunk-01, chunk-02, chunk-03…
          </div>
        )}
        {state.stage !== 'searching' && state.lastQuery && state.results.length === 0 && (
          <div className="result-empty">no postings matched <code style={{ color: 'var(--ink-0)' }}>{state.lastQuery}</code></div>
        )}
        {state.results.length > 0 && (
          <VirtualResults
            results={state.results}
            scrollRef={resultsScrollRef}
            renderRow={renderResultRow}
          />
        )}
      </div>
    </div>
  );
}

function Toasts({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => <div key={t.id} className={'toast ' + (t.kind || '')}>{t.msg}</div>)}
    </div>
  );
}

function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  return (
    <div className="tweaks">
      <h4>Tweaks</h4>
      <div className="tweak-row">
        <label>chunk size</label>
        <select value={tweaks.chunkSize} onChange={e => setTweaks({ ...tweaks, chunkSize: parseInt(e.target.value) })}>
          <option value="128">128 B</option>
          <option value="256">256 B</option>
          <option value="512">512 B</option>
          <option value="1024">1 KB</option>
        </select>
      </div>
      <div className="tweak-row">
        <label>replication</label>
        <select value={tweaks.replication} onChange={e => setTweaks({ ...tweaks, replication: parseInt(e.target.value) })}>
          <option value="1">×1</option>
          <option value="2">×2</option>
          <option value="3">×3</option>
        </select>
      </div>
      <div className="tweak-row">
        <label>target latency</label>
        <input type="range" min="0.3" max="3" step="0.1" value={tweaks.targetLatency} onChange={e => setTweaks({ ...tweaks, targetLatency: parseFloat(e.target.value) })}/>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--ink-1)', width: 44, textAlign: 'right' }}>{tweaks.targetLatency.toFixed(1)}ms</span>
      </div>
      <div className="tweak-row">
        <label>animation speed</label>
        <input type="range" min="0.3" max="2" step="0.1" value={tweaks.animSpeed} onChange={e => setTweaks({ ...tweaks, animSpeed: parseFloat(e.target.value) })}/>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--ink-1)', width: 44, textAlign: 'right' }}>{tweaks.animSpeed.toFixed(1)}×</span>
      </div>
    </div>
  );
}

/* ===== App ===== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "chunkSize": 512,
  "replication": 2,
  "targetLatency": 0.8,
  "animSpeed": 1
}/*EDITMODE-END*/;

function App() {
  const [files, setFiles] = useState([]);
  const [stage, setStage] = useState('idle');
  const [toasts, setToasts] = useState([]);
  const [highlightServer, setHighlightServer] = useState(null);
  const [serverMatches, setServerMatches] = useState({});
  const [matchedHandles, setMatchedHandles] = useState(new Set());
  const [results, setResults] = useState([]);
  const [lastQuery, setLastQuery] = useState('');
  const [latencyMs, setLatencyMs] = useState(0);
  const [selectedFile, setSelectedFile] = useState(null);
  const [sec, setSec] = useState(0);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [indexJobs, setIndexJobs] = useState([]);
  const [deletedFiles, setDeletedFiles] = useState([]);
  const [pane, setPane] = useState('namespace');  // 'namespace' | 'deleted'
  const toastIdRef = useRef(0);
  const jobIdRef = useRef(0);
  const filesRef = useRef(files);
  const indexJobsRef = useRef(indexJobs);
  useEffect(() => { filesRef.current = files; }, [files]);
  useEffect(() => { indexJobsRef.current = indexJobs; }, [indexJobs]);

  // Indexing-progress poller. One stable interval drives all active jobs so
  // multiple concurrent uploads stay in sync without spawning N timers, and
  // we don't tear the interval down on every state change.
  useEffect(() => {
    const POLL_MS = 1500;
    const ERROR_THRESHOLD = 3;
    const TIMEOUT_MS = 120000;
    const READY_LINGER_MS = 2200;

    const tick = async () => {
      const jobs = indexJobsRef.current;
      const now = Date.now();
      const active = jobs.filter(j => !j.done && !j.error && j.phase !== 'uploading');
      if (active.length === 0) return;

      const updates = await Promise.all(active.map(async (job) => {
        if (now - job.startedAt > TIMEOUT_MS) {
          return { id: job.id, patch: { error: true, errorAt: Date.now() } };
        }
        try {
          const r = await fetch('/api/index-status/' + encodeURIComponent(job.filename));
          if (!r.ok) {
            return { id: job.id, patch: { errorCount: job.errorCount + 1 } };
          }
          const data = await r.json();
          if (data.error) {
            return { id: job.id, patch: { errorCount: job.errorCount + 1 } };
          }
          return {
            id: job.id,
            patch: {
              indexed: data.indexed_chunks ?? job.indexed,
              total: data.total_chunks ?? job.total,
              done: !!data.done,
              errorCount: 0,
            },
          };
        } catch (e) {
          return { id: job.id, patch: { errorCount: job.errorCount + 1 } };
        }
      }));

      setIndexJobs(prev => prev.map(j => {
        const u = updates.find(x => x.id === j.id);
        if (!u) return j;
        const merged = { ...j, ...u.patch };
        if (merged.errorCount >= ERROR_THRESHOLD && !merged.error) {
          merged.error = true;
          merged.errorAt = Date.now();
        }
        if (merged.done && !j.done) merged.completedAt = Date.now();
        return merged;
      }));
    };

    const pollTimer = setInterval(tick, POLL_MS);
    // Auto-dismiss done/error rows after a brief linger.
    const cleanupTimer = setInterval(() => {
      const now = Date.now();
      setIndexJobs(prev => {
        const next = prev.filter(j => {
          if (j.done && j.completedAt && now - j.completedAt > READY_LINGER_MS) return false;
          if (j.error && j.errorAt && now - j.errorAt > READY_LINGER_MS * 2) return false;
          return true;
        });
        return next.length === prev.length ? prev : next;
      });
    }, 600);
    return () => { clearInterval(pollTimer); clearInterval(cleanupTimer); };
  }, []);

  useEffect(() => {
    const t = setInterval(() => setSec(s => (s + 1) % 60), 1000);
    return () => clearInterval(t);
  }, []);

  const toast = (msg, kind) => {
    const id = ++toastIdRef.current;
    setToasts(ts => [...ts, { id, msg, kind }]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 2400);
  };

  const refreshFiles = async () => {
    const list = await fetch('/api/files').then(r => r.json());
    setFiles(list.map(f => ({
      filename: f.filename,
      size: f.file_size,
      content: '',
      chunks: (f.chunks || []).map(c => {
        const zeroBased = (c.server_ids || []).map(id => id - 1);
        return {
          handle: c.handle,
          index: c.index,
          serverIdx: zeroBased[0] ?? 0,
          serverIds: zeroBased,
        };
      }),
    })));
  };

  const upload = async (file) => {
    if (filesRef.current.some(f => f.filename === file.filename)) {
      toast('already exists', 'err');
      return;
    }
    setStage('upload');
    toast(`uploading ${file.filename}…`, 'ok');

    // Create an "uploading" indexing job up-front so the user immediately sees a
    // status row. It transitions to "indexing" once /api/upload returns.
    const jobId = ++jobIdRef.current;
    setIndexJobs(prev => [
      ...prev.filter(j => j.filename !== file.filename),
      {
        id: jobId,
        filename: file.filename,
        phase: 'uploading',
        indexed: 0,
        total: 0,
        done: false,
        error: false,
        errorCount: 0,
        startedAt: Date.now(),
        completedAt: null,
        errorAt: null,
      },
    ]);

    const blob = typeof file.content === 'string'
      ? new Blob([file.content], { type: 'text/plain' })
      : file;
    const fd = new FormData();
    fd.append('file', blob, file.filename);

    for (let i = 0; i < 6; i++) {
      window.__stage?.fireUploadPacket(i % 3, i * 110);
    }

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: fd }).then(r => r.json());
      if (res.error) {
        toast(res.error, 'err');
        // Drop the job — upload itself failed, indexing won't happen.
        setIndexJobs(prev => prev.filter(j => j.id !== jobId));
        setStage('idle');
        return;
      }
      await refreshFiles();
      toast(`stored ${file.filename} · indexing…`, 'ok');
      // Seed total from the upload response so the bar shows X/Y immediately.
      setIndexJobs(prev => prev.map(j => j.id === jobId ? {
        ...j,
        phase: 'indexing',
        total: res.chunks ?? j.total,
        // Reset startedAt so the 120s timeout is measured from the start of indexing.
        startedAt: Date.now(),
      } : j));
    } catch (e) {
      toast('upload failed: ' + e.message, 'err');
      setIndexJobs(prev => prev.filter(j => j.id !== jobId));
    } finally {
      setStage('idle');
    }
  };

  const search = async (query, mode, targetFile) => {
    setStage('searching');
    setLastQuery(query);
    setMatchedHandles(new Set());
    setServerMatches({});
    setResults([]);
    window.__stage?.fireQueryPulse();

    try {
      const handleToServer = {};
      filesRef.current.forEach(f => f.chunks.forEach(c => handleToServer[c.handle] = c.serverIdx));
      const tokens = query.toLowerCase().split(/\W+/).filter(Boolean);
      const perServer = { 0: 0, 1: 0, 2: 0 };

      let fileHits = [];
      let latency = 0.8;

      if (mode === 'file' && targetFile) {
        const t0 = performance.now();
        const res = await fetch('/api/filesearch?filename=' + encodeURIComponent(targetFile) + '&q=' + encodeURIComponent(query)).then(r => r.json());
        latency = performance.now() - t0;
        if (res.error) { toast(res.error, 'err'); setStage('idle'); return; }

        const targetChunks = filesRef.current.find(f => f.filename === targetFile)?.chunks || [];
        fileHits = (res || []).map(m => {
          const chunk = targetChunks[m.chunk_index];
          const sIdx = chunk?.serverIdx ?? 0;
          const handle = chunk?.handle ?? '';
          perServer[sIdx]++;
          return {
            filename: targetFile,
            score: 1,
            line: m.line_number,
            snippetHtml: highlightPhrase(m.line_text.slice(0, 400), query),
            chunkHandle: handle,
            serverIdx: sIdx,
          };
        });
      } else {
        const res = await fetch('/api/search?q=' + encodeURIComponent(query)).then(r => r.json());
        latency = res.latency_ms ?? 0.8;
        fileHits = (res.results || []).map(h => {
          const sIdx = handleToServer[h.chunk_handle] ?? 0;
          perServer[sIdx]++;
          return {
            filename: h.filename,
            score: h.score,
            line: h.line_number,
            snippetHtml: highlightTokens(h.snippet, tokens),
            chunkHandle: h.chunk_handle,
            serverIdx: sIdx,
          };
        });
      }

      [0, 1, 2].forEach((sid, idx) => setTimeout(() => {
        setHighlightServer(sid);
        setServerMatches(p => ({ ...p, [sid]: perServer[sid] }));
        setMatchedHandles(p => {
          const s = new Set(p);
          fileHits.forEach(h => { if (h.serverIdx === sid) s.add(h.chunkHandle); });
          return s;
        });
      }, 200 + idx * 200));

      setLatencyMs(latency);

      setTimeout(() => {
        setResults(fileHits);
        setStage('idle');
        setHighlightServer(null);
        if (fileHits.length > 0) toast(`${fileHits.length} hit${fileHits.length > 1 ? 's' : ''} · ${latency.toFixed(2)}ms`, 'ok');
        else toast('no matches', 'err');
      }, 1000);
    } catch (e) {
      toast('search failed', 'err');
      setStage('idle');
    }
  };

  // Tweak mode plumbing
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
    return () => window.removeEventListener('message', onMsg);
  }, []);
  useEffect(() => {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*'); } catch {}
  }, [tweaks]);

  useEffect(() => { refreshFiles(); refreshDeleted(); }, []);

  const clearSearch = () => {
    setLastQuery('');
    setResults([]);
    setMatchedHandles(new Set());
    setServerMatches({});
    setLatencyMs(0);
    setHighlightServer(null);
    setStage('idle');
  };

  const refreshDeleted = async () => {
    try {
      const res = await fetch('/api/files/deleted').then(r => r.json());
      if (Array.isArray(res)) {
        setDeletedFiles(res);
      } else if (res && res.error) {
        toast('deleted-list: ' + res.error, 'err');
      }
    } catch (e) {
      toast('deleted-list failed: ' + e.message, 'err');
    }
  };

  // Refresh the deleted-files list when that pane is active.
  useEffect(() => {
    if (pane !== 'deleted') return;
    refreshDeleted();
    const t = setInterval(refreshDeleted, 5000);
    return () => clearInterval(t);
  }, [pane]);

  const deleteFile = async (filename) => {
    try {
      const res = await fetch('/api/files/' + encodeURIComponent(filename), { method: 'DELETE' }).then(r => r.json());
      if (res.error) { toast(res.error, 'err'); return false; }
      toast(`deleted ${filename}`, 'ok');
      if (selectedFile === filename) setSelectedFile(null);
      await Promise.all([refreshFiles(), refreshDeleted()]);
      return true;
    } catch (e) {
      toast('delete failed: ' + e.message, 'err');
      return false;
    }
  };

  const recoverFile = async (internalName) => {
    try {
      const res = await fetch('/api/files/' + encodeURIComponent(internalName) + '/recover', { method: 'POST' }).then(r => r.json());
      if (res.error) { toast(res.error, 'err'); return false; }
      toast(`recovered ${res.restored_filename}`, 'ok');
      await Promise.all([refreshFiles(), refreshDeleted()]);
      return true;
    } catch (e) {
      toast('recover failed: ' + e.message, 'err');
      return false;
    }
  };

  const api = {
    upload, search, toast,
    selectFile: setSelectedFile, clearSearch,
    deleteFile, recoverFile, refreshDeleted,
    setPane,
  };
  const state = { files, stage, highlightServer, serverMatches, matchedHandles, results, lastQuery, latencyMs, selectedFile, sec, tweaks, indexJobs, deletedFiles, pane };
  const totalChunks = files.reduce((a, f) => a + f.chunks.length, 0);

  return (
    <div className="app">
      <header className="topbar">
        <div className="logo">
          <div className="logo-mark"><span></span><span></span><span></span><span></span></div>
          <span>no-consensus</span>
          <small>distributed file system · search console</small>
        </div>
        <div className="cluster-status">
          <div className="stat"><span className="dot" style={{ background: 'var(--accent-3)', boxShadow: '0 0 8px var(--accent-3)' }}></span><span className="k">master</span><span className="v">ok</span></div>
          <div className="stat"><span className="dot"></span><span className="k">3/3</span><span className="v">chunkservers</span></div>
          <div className="stat"><span className="k">files</span><span className="v">{files.length}</span></div>
          <div className="stat"><span className="k">chunks</span><span className="v">{totalChunks}</span></div>
          <div className="stat"><span className="k">repl</span><span className="v">×{tweaks.replication}</span></div>
        </div>
      </header>

      <LeftPanel state={state} api={api} />
      <Stage state={state} tweaks={tweaks} />
      <RightPanel state={state} api={api} />

      <Toasts toasts={toasts} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />

      <style>{`
        @keyframes flyPacket {
          0%   { transform: translate3d(calc(-50vw - 200px), -10px, 0) scale(1); opacity: 0; }
          6%   { opacity: 1; }
          42%  { transform: translate3d(var(--mx), -40px, var(--mz)) scale(1); }
          56%  { transform: translate3d(var(--mx), -20px, var(--mz)) scale(1.2); }
          92%  { transform: translate3d(var(--tx), -60px, var(--tz)) scale(1); opacity: 1; }
          100% { transform: translate3d(var(--tx), 0, var(--tz)) scale(0.5); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
