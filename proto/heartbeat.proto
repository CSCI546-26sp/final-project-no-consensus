syntax = "proto3";

package dfs;

// Master <-> Chunk Server internal communication

service HeartbeatService {
  // Chunk server sends periodic heartbeat to master
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);

  // Master tells chunk server to copy a chunk from another server
  rpc ReplicateChunk (ReplicateChunkRequest) returns (ReplicateChunkResponse);

  // Master forwards a search query to a chunk server
  rpc SearchChunks (SearchChunksRequest) returns (SearchChunksResponse);
}

// --- Heartbeat ---

message HeartbeatRequest {
  int32 server_id = 1;
  int64 available_disk = 2;          // bytes of free disk space
  repeated string chunk_handles = 3; // all chunks this server holds
}

message HeartbeatResponse {
  bool success = 1;
}

// --- Replication ---

message ReplicateChunkRequest {
  string chunk_handle = 1;
  string source_address = 2;  // address to copy the chunk from
}

message ReplicateChunkResponse {
  bool success = 1;
  string message = 2;
}

// --- Search (master -> chunk server) ---

message SearchChunksRequest {
  string query = 1;
}

message ChunkMatch {
  string chunk_handle = 1;
  int32 line_number = 2;
  float score = 3;
  string snippet = 4;
}

message SearchChunksResponse {
  repeated ChunkMatch matches = 1;
}
